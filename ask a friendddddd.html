<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you be my friend?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      color: #333;
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    .message {
      color: #666;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      min-width: 120px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .yes {
      background: linear-gradient(135deg, #4caf50, #45a049);
    }

    .no {
      background: linear-gradient(135deg, #f44336, #d32f2f);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .response {
      margin-top: 25px;
      padding: 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.1rem;
      animation: fadeIn 0.5s ease;
    }

    .response.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 2px solid #4caf50;
    }

    .response.error {
      background: #ffebee;
      color: #c62828;
      border: 2px solid #f44336;
    }

    .hidden {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Confetti animation for Yes */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #ffd700;
      animation: fall 3s linear infinite;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="emoji">💜</div>
      <h1>Will you be my friend?</h1>
      <p class="message">I've been wanting to get to know you better. You seem really nice!</p>
      
      <div class="buttons">
        <button id="yesBtn" class="btn yes" onclick="handleAnswer('Yes')">
          Yes 😊
        </button>
        <button id="noBtn" class="btn no" onclick="handleAnswer('No')">
          No 😔
        </button>
      </div>
      
      <p id="response" class="response hidden"></p>
    </div>
  </div>

  <script>
    // =====================================================
    // ⚠️ IMPORTANT: Replace this with your Formspree ID!
    // =====================================================
    // 1. Go to https://formspree.io and create free account
    // 2. Create new form, copy the ID from your form URL
    // 3. Replace 'YOUR_FORMSPREE_ID' below with your actual ID
    //    Example: 'https://formspree.io/f/abc123' → use 'abc123'
    // =====================================================
    const FORMSPREE_ID = 'YOUR_FORMSPREE_ID';
    // =====================================================

    function handleAnswer(answer) {
      const yesBtn = document.getElementById('yesBtn');
      const noBtn = document.getElementById('noBtn');
      const response = document.getElementById('response');

      // Disable buttons
      yesBtn.disabled = true;
      noBtn.disabled = true;

      // Check if user set up Formspree
      if (FORMSPREE_ID === 'YOUR_FORMSPREE_ID') {
        // Show answer locally (for testing)
        if (answer === 'Yes') {
          response.textContent = 'Yay! 💌 I\'ll let them know!';
          response.className = 'response success';
          createConfetti();
        } else {
          response.textContent = 'Oh no! 😔 I\'ve told them you said no.';
          response.className = 'response error';
        }
        
        alert('⚠️ NOTE: To receive emails, you need to set up Formspree!\n\nSee the instructions in the HTML file.');
        return;
      }

      // Send to Formspree
      const formData = new FormData();
      formData.append('answer', answer);
      formData.append('timestamp', new Date().toLocaleString());

      fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      })
      .then(response => {
        if (response.ok) {
          if (answer === 'Yes') {
            responseElement.textContent = 'Yay! 💌 I\'ll let them know!';
            responseElement.className = 'response success';
            createConfetti();
          } else {
            responseElement.textContent = 'Oh no! 😔 I\'ve told them you said no.';
            responseElement.className = 'response error';
          }
        } else {
          responseElement.textContent = 'Something went wrong!';
          responseElement.className = 'response error';
        }
      })
      .catch(error => {
        console.error('Error:', error);
        responseElement.textContent = 'Error sending answer!';
        responseElement.className = 'response error';
      });
    }

    function createConfetti() {
      const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bd6'];
      
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = -10 + 'px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(confetti);
      }
    }
  </script>
</body>
</html>
